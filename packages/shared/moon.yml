language: "typescript"
layer: "library"
stack: "infrastructure"

tasks:
  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-shared"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
    options:
      cache: true
