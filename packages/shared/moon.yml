language: "typescript"
layer: "library"
stack: "infrastructure"

tasks:
  build:
    script: "tsx scripts/sync-public-contract.ts && vite build"

  sync-contract:
    command: "tsx scripts/sync-public-contract.ts"
    options:
      cache: false

  verify-contract:
    command: "tsx scripts/verify-root-contract.ts"
    deps:
      - "~:build"
    options:
      cache: false

  report-legacy-imports:
    command: "tsx scripts/report-legacy-imports.ts --write"
    options:
      cache: false

  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-shared"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
    options:
      cache: true

  test-unit:
    extends: "test"
