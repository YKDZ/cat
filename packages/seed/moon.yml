language: "typescript"
layer: "library"
stack: "backend"

tasks:
  build:
    script: "vite build && tsc -b tsconfig.lib.json"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist/"
    deps:
      - "^:build"
    options:
      cache: true

  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    deps:
      - "^:build"
    options:
      cache: true

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-seed"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
    options:
      cache: true

  test-unit:
    extends: "test"
