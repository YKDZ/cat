language: "typescript"
layer: "library"
stack: "infrastructure"
tags:
  - "tooling"

tasks:
  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-oxlint-plugin"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true
