language: "typescript"
layer: "library"
stack: "frontend"

tasks:
  build:
    script: "vite build && vue-tsc --project tsconfig.build.json"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist/"
    deps:
      - "^:build"
    options:
      cache: true

  typecheck:
    script: "tsc --noEmit -p tsconfig.json && vue-tsc --noEmit -p tsconfig.json"

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-ui"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true

  test-unit:
    extends: "test"
