packages:
  - path: packages/domain
    name: "@cat/domain"
    description: "Domain layer: CQRS Commands and Queries, core business logic"
    priority: high
    include:
      - "src/**/*.ts"
    exclude:
      - "**/*.test.ts"
      - "**/*.spec.ts"

  - path: packages/operations
    name: "@cat/operations"
    description: "Operations layer: composing domain operations into business workflows, functions suffixed with Op"
    priority: high
    include:
      - "src/**/*.ts"
    exclude:
      - "**/*.test.ts"
      - "**/*.spec.ts"

  - path: packages/shared
    name: "@cat/shared"
    description: "Shared Zod schemas, type definitions, and utility functions"
    priority: medium

  - path: packages/db
    name: "@cat/db"
    description: "Database layer: Drizzle ORM schemas and Redis client"
    priority: medium

  - path: packages/permissions
    name: "@cat/permissions"
    description: "Permission system: ReBAC-based access control"
    priority: medium

  - path: packages/agent
    name: "@cat/agent"
    description: "Agent and Workflow graph executor"
    priority: medium

output:
  path: apps/docs/src/autodoc
  format: markdown

llmsTxt:
  enabled: true
