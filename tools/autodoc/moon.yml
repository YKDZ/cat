language: "typescript"
layer: "tool"
stack: "infrastructure"

tasks:
  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  generate:
    command: "node dist/cli.js generate"
    inputs:
      - "/autodoc.config.ts"
      - "/sections.config.ts"
      - "/autodoc.subjects/**/*.subject.ts"
      - "/**/*.semantic.md"
    deps:
      - "~:build"
      - "^:build"
    options:
      cache: false

  check:
    command: "node dist/cli.js check"
    inputs:
      - "/autodoc.config.ts"
      - "/sections.config.ts"
      - "/autodoc.subjects/**/*.subject.ts"
      - "/**/*.semantic.md"
    deps:
      - "~:build"
      - "^:build"
    options:
      cache: false

  validate:
    command: "node dist/cli.js validate"
    inputs:
      - "/autodoc.config.ts"
      - "/sections.config.ts"
      - "/autodoc.subjects/**/*.subject.ts"
      - "/**/*.semantic.md"
    deps:
      - "~:build"
      - "^:build"
    options:
      cache: false

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-autodoc"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true

  test-unit:
    extends: "test"
