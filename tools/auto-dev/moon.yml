language: "typescript"
layer: "tool"
stack: "infrastructure"

tasks:
  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  build:
    script: "vite build"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist"
    options:
      cache: true

  lint:
    script: "oxlint -c oxlint.config.ts src/"
    inputs:
      - "@group(sources)"
    options:
      cache: true

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-auto-dev"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
    options:
      cache: true

  test-unit:
    extends: "test"
