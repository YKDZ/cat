name: Full Code Quality

on:
  workflow_dispatch:

jobs:
  full-quality:
    name: Run All Typcheck, Lint and Format Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Nx Sync
        run: pnpm nx sync:check

      - name: Check Generated Drizzle Schemas
        run: pnpm check:generated-schemas

      - name: Run ALL Tasks
        env:
          REDIS_URL: "redis://localhost:6379"
        run: |
          pnpm exec nx run-many \
            --targets=lint,typecheck,fmt:check \
            --parallel=3
