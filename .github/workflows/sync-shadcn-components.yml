name: Sync Shadcn-Vue Components

on:
  schedule:
    # Run at 00:00 UTC on the 1st day of every month
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-components:
    name: Check Shadcn-Vue Components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Component Sync Status
        run: node packages/ui/scripts/sync-shadcn-components.js --check
        id: check-components
        continue-on-error: true

      - name: Generate Issue Content from Template
        if: steps.check-components.outcome == 'failure'
        run: |
          # Remove YAML frontmatter (everything between first two ---) and replace placeholder
          awk 'BEGIN {in_frontmatter=0; count=0} /^---$/ {count++; next} count==2 && !in_frontmatter {in_frontmatter=1} in_frontmatter {print}' \
            .github/ISSUE_TEMPLATE/sync-components.md | \
            sed "s|ACTION_RUN_URL_PLACEHOLDER|https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|" \
            > /tmp/issue-content.md

      - name: Create Issue if Updates Needed
        if: steps.check-components.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🔄 Shadcn-Vue Components Update Available"
          content-filepath: /tmp/issue-content.md
          labels: |
            dependencies
            shadcn-vue
            automated
          assignees: ""

      - name: Output Summary
        run: |
          echo "## Component Sync Check Summary"
          echo ""
          if [ "${{ steps.check-components.outcome }}" == "success" ]; then
            echo "✅ All components are up to date"
          else
            echo "❌ Updates available - please run locally:"
            echo "\`\`\`bash"
            echo "node packages/ui/scripts/sync-shadcn-components.js"
            echo "\`\`\`"
          fi
