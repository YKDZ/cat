name: Autodoc Check

on:
  pull_request:
    paths:
      - "packages/domain/**"
      - "packages/operations/**"
      - "packages/shared/**"
      - "packages/db/**"
      - "packages/permissions/**"
      - "packages/agent/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & generate docs
        run: |
          pnpm nx build autodoc
          pnpm autodoc check
