version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: widen
    open-pull-requests-limit: 64
    groups:
      orpc:
        patterns:
          - "@orpc/*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      vueuse:
        patterns:
          - "@vueuse/*"
      moon:
        patterns:
          - "@moonrepo/*"
      drizzle:
        patterns:
          - "drizzle*"
      iconify-json:
        patterns:
          - "@iconify-json/*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/node"
        versions:
          - ">= 25"
