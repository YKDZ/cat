language: "typescript"
layer: "automation"
stack: "frontend"
tags:
  - "e2e"

dependsOn:
  - "app"
  - "seed"

tasks:
  typecheck:
    command: "tsc --noEmit -p tsconfig.json"

  test-e2e:
    command: "playwright test"
    inputs:
      - "tests/**/*"
      - "global-setup.ts"
      - "playwright.config.ts"
    options:
      cache: false

workspace:
  inheritedTasks:
    exclude: ["build", "test"]
