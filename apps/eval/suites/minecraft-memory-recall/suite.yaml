name: minecraft-memory-recall
description: Evaluate memory recall against Minecraft translation memory (150 sentence pairs)

seed:
  project: seed/project.json
  memory: seed/memory.json

plugins:
  loader: real
  overrides:
    - plugin: openai-vectorizer
      scope: GLOBAL
      config:
        model-id: "${VECTORIZER_MODEL_ID:-qwen3-embedding:4b}"
        baseURL: "${VECTORIZER_BASE_URL:-http://172.17.0.1:11435/v1}"
        apiKey: "${VECTORIZER_API_KEY:-dummy-key}"
    - plugin: pgvector-storage
      scope: GLOBAL
      config: {}
    - plugin: spacy-segmenter
      scope: GLOBAL
      config:
        serverUrl: "${SPACY_SERVER_URL:-http://172.17.0.1:8000}"

scenarios:
  - type: memory-recall
    test-set: test-sets/memory-recall.yaml
    scorers: [precision, recall, f1, hit-rate, channel-coverage, latency]
    params:
      maxAmount: 5
      minSimilarity: 0.72
      minVariantSimilarity: 0.7
      timeoutMs: 60000

thresholds:
  channel-coverage: ">= 1"
