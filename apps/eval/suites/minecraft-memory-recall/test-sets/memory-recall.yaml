        expectedTranslation: "Steve被闪电击中"
    negativeMemories: []
  - id: mc-mem-022
    inputText: "Steve was squished too much"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:death:death_attack_cramming"
        expectedSource: "Steve was squished too much"
        expectedTranslation: "Steve因被过度挤压而死"
    negativeMemories: []
  - id: mc-mem-023
    inputText: "Brush a Suspicious block to obtain a Pottery Sherd"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:adv:advancements_adventure_salvage_sherd_description"
