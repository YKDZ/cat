        expectedTranslation: "Steve死于僵尸"
    negativeMemories: []
  - id: mc-mem-027
    inputText: "Controls whether fire and lava should be able to tick further than 8 chunks away from any player."
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:gamerule:gamerule_allowFireTicksAwayFromPlayer_description"
