    negativeMemories: []
  - id: mc-mem-026
    inputText: "You need to steve died because of a Zombie"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:death:death_attack_generic_player"
