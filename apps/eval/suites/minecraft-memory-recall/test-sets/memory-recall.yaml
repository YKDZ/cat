        expectedTranslation: "控制火和熔岩能否在距离任何玩家超过8个区块处蔓延。"
    negativeMemories: []
  - id: mc-mem-028
    inputText: "Scrape a Copper Bulb with an Axe to make it brighter"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:adv:advancements_adventure_lighten_up_description"
