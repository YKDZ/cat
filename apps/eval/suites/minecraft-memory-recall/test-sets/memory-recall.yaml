        expectedTranslation: "在与方块交互引起的爆炸中，部分被破坏方块的掉落物会被炸毁。"
    negativeMemories: []
  - id: mc-mem-030
    inputText: "I'm annoyed with them / they have done something I do not like. in Minecraft"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:gui:gui_abuseReport_reason_generic_description"
        expectedSource: "I'm annoyed with them / they have done something I do not like."
        expectedTranslation: "该玩家使我恼怒或做的事情使我反感。"
    negativeMemories: []
  - id: mc-mem-031
    inputText: "You need to steve was roasted in dragon's breath"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:death:death_attack_dragonBreath"
        expectedSource: "Steve was roasted in dragon's breath"
