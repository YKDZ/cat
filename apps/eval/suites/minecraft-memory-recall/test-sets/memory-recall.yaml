    negativeMemories: []
  - id: mc-mem-024
    inputText: "Eat everything that is edible, even if it's not good for you"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:adv:advancements_husbandry_balanced_diet_description"
        expectedSource: "Eat everything that is edible, even if it's not good for you"
        expectedTranslation: "尝遍天下食材，即便是对身体不好的"
