    expectedMemories:
      - memoryItemRef: "mem:gui:selectWorld_edit_backupSize"
        expectedSource: "size: %s MB"
        expectedTranslation: "大小：%s MB"
    negativeMemories: []
  - id: mc-mem-039
    inputText: "Steve was impaled by a"
    sourceLanguage: en
    targetLanguage: zh-Hans
    expectedMemories:
      - memoryItemRef: "mem:death:death_attack_trident"
        expectedSource: "Steve was impaled by a Zombie"
        expectedTranslation: "Steve被僵尸刺穿了"
