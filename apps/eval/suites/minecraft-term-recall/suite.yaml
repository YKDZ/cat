name: minecraft-term-recall
description: Evaluate term recall precision against Minecraft game terminology glossary (276 terms)

seed:
  project: seed/project.json
  glossary: seed/glossary.json

plugins:
  loader: real
  overrides:
    - plugin: openai-vectorizer
      scope: GLOBAL
      config:
        model-id: "${VECTORIZER_MODEL_ID:-qwen3-embedding:4b}"
        baseURL: "${VECTORIZER_BASE_URL:-http://172.17.0.1:11435/v1}"
        apiKey: "${VECTORIZER_API_KEY:-dummy-key}"
    - plugin: pgvector-storage
      scope: GLOBAL
      config: {}
    - plugin: spacy-segmenter
      scope: GLOBAL
      config:
        serverUrl: "${SPACY_SERVER_URL:-http://172.17.0.1:8000}"

scenarios:
  - type: term-recall
    test-set: test-sets/term-recall.yaml
    scorers: [precision, recall, f1, mrr, hit-rate, latency]
    params:
      maxAmount: 10
      wordSimilarityThreshold: 0.3
      minMorphologySimilarity: 0.7
      minSemanticSimilarity: 0.6
      timeoutMs: 60000
