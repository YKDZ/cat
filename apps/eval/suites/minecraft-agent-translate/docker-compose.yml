services:
  redis:
    image: redis
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    ports:
      - 6379:6379

  postgresql:
    build:
      context: ../../../postgres-search-runtime
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cat
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - 11435:11434
    healthcheck:
      test:
        - "CMD-SHELL"
        - "bash -c '</dev/tcp/localhost/11434'"
      start_period: 30s
      interval: 15s
      retries: 5
      timeout: 5s

  spacy:
    build:
      context: ../../../spacy-server
      args:
        SPACY_MODELS: "en_core_web_sm zh_core_web_sm ja_core_news_sm de_core_news_sm"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  ollama-data:
