name: minecraft-agent-translate
description: Evaluate agent-driven translation of 100 Minecraft elements (en→zh-Hans)

seed:
  project: seed/project.json
  glossary: seed/glossary.json
  memory: seed/memory.json
  elements: seed/elements.json
  agentDefinition: translator

plugins:
  loader: real
  overrides:
    - plugin: spacy-segmenter
      scope: GLOBAL
      config:
        serverUrl: "${SPACY_SERVER_URL:-http://172.17.0.1:8000}"
    - plugin: openai-vectorizer
      scope: GLOBAL
      config:
        model-id: "${VECTORIZER_MODEL_ID:-qwen3-embedding:4b}"
        baseURL: "${VECTORIZER_BASE_URL:-http://172.17.0.1:11435/v1}"
        apiKey: "${VECTORIZER_API_KEY:-dummy-key}"
    - plugin: pgvector-storage
      scope: GLOBAL
      config: {}
    - plugin: openai-llm-provider
      scope: GLOBAL
      config:
        model-id: "${LLM_MODEL_ID:-gpt-5-mini}"
        baseURL: "${LLM_BASE_URL:-http://192.168.2.23:8317/v1}"
        apiKey: "${LLM_API_KEY:-sk-1256987qazA}"

scenarios:
  - type: agent-translate
    test-set: test-sets/agent-translate.yaml
    scorers:
      - instruction-adherence
      - term-compliance
      - chrf
      - token-cost
      - agent-latency
    params:
      timeoutMs: 2400000

thresholds:
  instruction-adherence: ">= 0.90"
  term-compliance: ">= 0.70"
  chrf: ">= 0.40"
