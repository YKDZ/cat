services:
  redis:
    image: redis
    container_name: eval_redis
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    ports:
      - 6379:6379

  postgresql:
    image: pgvector/pgvector:pg18
    container_name: eval_postgresql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cat
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s

  ollama:
    image: ollama/ollama
    container_name: eval_ollama
    volumes:
      - ./ollama:/root/.ollama
    ports:
      - 11435:11434
    healthcheck:
      test:
        - "CMD-SHELL"
        - "bash -c '</dev/tcp/localhost/11434'"
      start_period: 30s
      interval: 15s
      retries: 5
      timeout: 5s
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  libretranslate:
    container_name: eval_libretranslate
    image: libretranslate/libretranslate
    ports:
      - 5000:5000
    healthcheck:
      test:
        - CMD-SHELL
        - ./venv/bin/python scripts/healthcheck.py
    environment:
      - LT_LOAD_ONLY=zh,en

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    container_name: eval_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --spider -q http://localhost:16686/ || exit 1"
      start_period: 10s
      interval: 15s
      retries: 5
      timeout: 3s

