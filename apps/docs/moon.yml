language: "typescript"
layer: "application"
stack: "frontend"
tags:
  - "docs"

tasks:
  build:
    command: "vitepress build src"

  dev:
    command: "vitepress dev src"
    preset: "server"

  preview:
    command: "vitepress preview src"
    deps:
      - "~:build"
    options:
      persistent: true

  typecheck:
    command: "tsc --noEmit -p tsconfig.app.json"

workspace:
  inheritedTasks:
    exclude: ["test"]
