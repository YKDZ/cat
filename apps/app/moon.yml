language: "typescript"
layer: "application"
stack: "frontend"
tags:
  - "app"
  - "deployable"

tasks:
  build:
    script: "vike build"
    inputs:
      - "src/**/*"
      - "locales/**/*"
      - "default-plugins.json"
      - "vite.config.ts"
      - "package.json"
      - "tsconfig*.json"
    outputs:
      - "dist/"
    deps:
      - "^:build"
      - "password-auth-provider:build"
      - "json-file-handler:build"
      - "yaml-file-handler:build"
      - "markdown-file-handler:build"
      - "local-storage-provider:build"
      - "basic-tokenizer:build"
      - "basic-qa-checker:build"
      - "tiny-widget:build"
      - "openai-vectorizer:build"
      - "openai-llm-provider:build"
      - "libretranslate-advisor:build"
      - "spacy-segmenter:build"
      - "tei-rerank-provider:build"
    options:
      cache: true

  dev:
    script: "vike dev | pino-pretty"
    preset: "server"
    deps:
      - "db:push"
      - "password-auth-provider:build"
      - "json-file-handler:build"
      - "yaml-file-handler:build"
      - "markdown-file-handler:build"
      - "local-storage-provider:build"
      - "basic-tokenizer:build"
      - "basic-qa-checker:build"
      - "tiny-widget:build"
      - "openai-vectorizer:build"
      - "openai-llm-provider:build"
      - "libretranslate-advisor:build"
      - "spacy-segmenter:build"
      - "tei-rerank-provider:build"

  preview:
    script: "tsx scripts/copy-drizzle.ts && cross-env NODE_ENV=production node dist/server/index.mjs"
    deps:
      - "~:build"
      - "db:push"
    options:
      persistent: true

  typecheck:
    script: "tsc --noEmit -p tsconfig.json && tsc --noEmit -p scripts/tsconfig.json && vue-tsc --noEmit -p tsconfig.json && vue-tsc --noEmit -p tsconfig.spec.json"

  copy-drizzle:
    command: "tsx scripts/copy-drizzle.ts"
    options:
      cache: false

  docker-build:
    command: "docker buildx build ../../ -f Dockerfile -t ykdz/cat"
    options:
      cache: false
      runInCI: false

  docker-push:
    command: "docker push ykdz/cat"
    options:
      cache: false
      runInCI: false

  test:
    command: "vitest run --config ../../vitest.config.ts --project=unit-app"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true

  test-unit:
    extends: "test"
