name: cat-local

# Local-only infrastructure for `app:dev` / `app:preview`.
# Keep PostgreSQL / Redis on high host ports so this stack can coexist with
# `apps/app-e2e/docker-compose.yml`, which intentionally owns 5432 / 6379.
# LibreTranslate / spaCy also use high host ports by default so this stack can
# coexist with older containers still bound to 5000 / 8000.
services:
  redis:
    image: redis
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    ports:
      - "${CAT_LOCAL_REDIS_HOST_PORT:-26379}:6379"

  postgresql:
    build:
      context: ../postgres-search-runtime
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cat
    ports:
      - "${CAT_LOCAL_POSTGRES_HOST_PORT:-25432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s

  # ollama:
  #   image: ollama/ollama
  #   container_name: cat_ollama
  #   volumes:
  #     - ./ollama:/root/.ollama
  #   ports:
  #     - 11434:11434
  #   healthcheck:
  #     test:
  #       - "CMD-SHELL"
  #       - |
  #         test -f /tmp/ollama_ready && \
  #         bash -c '</dev/tcp/localhost/11434'
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: all
  #           capabilities: [gpu]

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "${CAT_LOCAL_LIBRETRANSLATE_HOST_PORT:-25000}:5000"
    healthcheck:
      test:
        - CMD-SHELL
        - ./venv/bin/python scripts/healthcheck.py
    environment:
      - LT_LOAD_ONLY=zh,en

  spacy:
    build:
      context: ../spacy-server
      args:
        SPACY_MODELS: "en_core_web_sm zh_core_web_sm ja_core_news_sm de_core_news_sm"
    ports:
      - "${CAT_LOCAL_SPACY_HOST_PORT:-28000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
