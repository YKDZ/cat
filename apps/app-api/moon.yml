language: "typescript"
layer: "application"
stack: "backend"
tags:
  - "api"

tasks:
  typecheck:
    script: "tsc --noEmit -p tsconfig.lib.json && tsc --noEmit -p tsconfig.spec.json"

  test:
    command: "vitest run --config ../../vitest.config.ts --project=app-api"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true

  test-unit:
    command: "vitest run --config ../../vitest.config.ts --project=app-api --include='**/*.spec.ts'"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true

  test-integration:
    command: "vitest run --config ../../vitest.config.ts --project=app-api --include='**/*.test.ts'"
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    deps:
      - "^:build"
      - "test-utils:build"
    options:
      cache: true
