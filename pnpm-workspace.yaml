packages:
  - apps/*
  - packages/*
  - "@cat-plugin/*"
  - tools/*

allowBuilds:
  "@swc/core": true
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  vue-demi: true

catalog:
  "@types/node": ^24.1.0
  unplugin-dts: ^1.0.0-beta.6
  vite: ^8.0.7
  vitest: ^4.1.3
  vue: ^3.5.32
  zod: ^4.3.6
  tsx: ^4.21.0

linkWorkspacePackages: true

syncInjectedDepsAfterScripts: ["build"]
