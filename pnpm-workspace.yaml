packages:
  - apps/*
  - packages/*
  - "@cat-plugin/*"
  - tools/*

allowBuilds:
  "@swc/core": true
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  vue-demi: true

catalog:
  "@types/mdast": "^4.0.4"
  "@types/node": ^24.12.2
  "@vue/compiler-dom": ^3.5.34
  "@vue/compiler-sfc": ^3.5.34
  drizzle-kit: 1.0.0-rc.2
  drizzle-orm: 1.0.0-rc.2
  drizzle-seed: ^0.3.1
  remark-frontmatter: ^5.0.0
  remark-gfm: ^4.0.1
  remark-parse: ^11.0.0
  remark-stringify: ^11.0.0
  tsx: ^4.21.0
  unified: ^11.0.5
  unplugin-dts: 1.0.1
  vite: ^8.0.11
  vitest: ^4.1.5
  vue: ^3.5.34
  yaml: ^2.8.4
  zod: ^4.4.3
  vue-tsc: ^3.2.8

linkWorkspacePackages: true

syncInjectedDepsAfterScripts: ["build"]
