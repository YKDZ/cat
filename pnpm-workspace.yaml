packages:
  - apps/*
  - packages/*
  - "@cat-plugin/*"
  - tools/*

allowBuilds:
  "@swc/core": true
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  vue-demi: true

catalog:
  "@types/mdast": "^4.0.4"
  "@types/node": ^25.9.3
  "@vue/compiler-dom": ^3.5.38
  "@vue/compiler-sfc": ^3.5.38
  drizzle-kit: 1.0.0-rc.4-273829f
  drizzle-orm: 1.0.0-rc.4-273829f
  drizzle-seed: ^0.3.1
  remark-frontmatter: ^5.0.0
  remark-gfm: ^4.0.1
  remark-parse: ^11.0.0
  remark-stringify: ^11.0.0
  tsx: ^4.22.4
  unified: ^11.0.5
  unplugin-dts: 1.0.2
  vite: ^8.0.16
  vitest: ^4.1.8
  vue: ^3.5.38
  yaml: ^2.9.0
  zod: ^4.4.3
  vue-tsc: ^3.3.4

linkWorkspacePackages: true

peerDependencyRules:
  allowedVersions:
    "@vee-validate/zod>zod": ^4.0.0
    "@tailwindcss/typography>tailwindcss": ">=4.0.0"

minimumReleaseAgeExclude:
  - '@lucide/vue@1.18.0'
  - '@orpc/client@1.14.6'
  - '@orpc/contract@1.14.6'
  - '@orpc/experimental-pino@1.14.6'
  - '@orpc/interop@1.14.6'
  - '@orpc/server@1.14.6'
  - '@orpc/shared@1.14.6'
  - '@orpc/standard-server-aws-lambda@1.14.6'
  - '@orpc/standard-server-fastify@1.14.6'
  - '@orpc/standard-server-fetch@1.14.6'
  - '@orpc/standard-server-node@1.14.6'
  - '@orpc/standard-server-peer@1.14.6'
  - '@orpc/standard-server@1.14.6'
  - dompurify@3.4.10

syncInjectedDepsAfterScripts: [ "build" ]
