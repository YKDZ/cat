  better-sqlite3: true
  esbuild: true
  protobufjs: true
  vue-demi: true

catalog:
  "@types/mdast": "^4.0.4"
  "@types/node": ^24.12.4
  "@vue/compiler-dom": ^3.5.34
  "@vue/compiler-sfc": ^3.5.34
  drizzle-kit: 1.0.0-rc.4-273829f
  drizzle-orm: 1.0.0-rc.4-273829f
  drizzle-seed: ^0.3.1
  remark-frontmatter: ^5.0.0
  remark-gfm: ^4.0.1
  remark-parse: ^11.0.0
  remark-stringify: ^11.0.0
  tsx: ^4.22.3
  unified: ^11.0.5
  unplugin-dts: 1.0.1
  vite: ^8.0.14
  vitest: ^4.1.7
  vue: ^3.5.34
  yaml: ^2.9.0
  zod: ^4.4.3
  vue-tsc: ^3.3.1

linkWorkspacePackages: true

syncInjectedDepsAfterScripts: [ "build" ]
