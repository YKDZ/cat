id: root

language: "typescript"

tasks:
  lint:
    command: "oxlint --type-aware *.ts scripts/**/*.ts"
    deps: []
    options:
      mergeArgs: replace
      mergeDeps: replace
      runFromWorkspaceRoot: true

  lint-fix:
    script: "oxlint --fix --type-aware *.ts scripts/**/*.ts"
    deps: []
    options:
      mergeDeps: replace
      runFromWorkspaceRoot: true
      cache: false

  fmt:
    command: "oxfmt *.ts *.json scripts/**/*.ts scripts/**/*.js .github/**/* .devcontainer/**/* __mocks__/**/* .vscode/**/*"
    options:
      runFromWorkspaceRoot: true

  fmt-check:
    command: "oxfmt --check *.ts *.json scripts/**/*.ts scripts/**/*.js .github/**/* .devcontainer/**/* __mocks__/**/* .vscode/**/*"
    options:
      mergeArgs: replace
      runFromWorkspaceRoot: true

  typecheck:
    script: "tsc --noEmit -p tsconfig.node.json && tsc --noEmit -p scripts/tsconfig.json"
    deps: []
    options:
      mergeDeps: replace
      runFromWorkspaceRoot: true

  codegen-check:
    script: |
      echo "=== Drizzle Zod schema check ==="
      pnpm moon run db:codegen-schemas --quiet
      git diff --exit-code -- packages/shared/src/schema/drizzle || { echo "ERROR: Drizzle Zod schemas are out of date. Run 'pnpm moon run db:codegen-schemas' and commit." >&2; exit 1; }

      echo "=== Autodoc check ==="
      pnpm moon run autodoc:check --quiet

      echo "=== Moon sync projects check ==="
      pnpm moon sync projects --quiet
      git diff --exit-code -- '**/tsconfig*.json' || { echo "ERROR: tsconfig project references are out of date. Run 'moon sync projects' and commit." >&2; exit 1; }
    deps:
      - "shared:build"
      - "autodoc:build"
    options:
      cache: false
      runFromWorkspaceRoot: true

workspace:
  inheritedTasks:
    exclude: ["build", "test"]
