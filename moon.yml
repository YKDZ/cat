id: root

language: "typescript"

tasks:
  lint:
    command: "oxlint --type-aware *.ts scripts/**/*.ts"
    deps: []
    options:
      mergeArgs: replace
      mergeDeps: replace
      runFromWorkspaceRoot: true

  lint-fix:
    script: "oxlint --fix --type-aware *.ts scripts/**/*.ts"
    deps: []
    options:
      mergeDeps: replace
      runFromWorkspaceRoot: true
      cache: false

  fmt:
    command: "oxfmt *.ts *.json scripts/**/*.ts scripts/**/*.js .github/**/* .devcontainer/**/* __mocks__/**/* .vscode/**/*"
    options:
      runFromWorkspaceRoot: true

  fmt-check:
    command: "oxfmt --check *.ts *.json scripts/**/*.ts scripts/**/*.js .github/**/* .devcontainer/**/* __mocks__/**/* .vscode/**/*"
    options:
      mergeArgs: replace
      runFromWorkspaceRoot: true

  typecheck:
    script: "tsc --noEmit -p tsconfig.node.json"
    deps: []
    options:
      mergeDeps: replace
      runFromWorkspaceRoot: true

  codegen-check:
    script: |
      set -eo pipefail
      echo "=== Drizzle Zod schema check ==="
      pnpm moon run db:codegen-schemas --quiet
      if ! git diff --exit-code -- packages/shared/src/schema/drizzle; then
        echo "ERROR: Drizzle Zod schemas are out of date. Run 'pnpm moon run db:codegen-schemas' and commit." >&2
        exit 1
      fi

      echo "=== Moon sync projects check ==="
      pnpm moon sync projects --quiet
      allowed_tsconfig_diff="tools/autodoc/tsconfig.json tools/autodoc/tsconfig.lib.json tools/autodoc/tsconfig.spec.json"
      modified_tsconfig_diff="$(git diff --name-only --diff-filter=ACMRTUXB -- '**/tsconfig*.json')"
      deleted_tsconfig_diff="$(git diff --name-only --diff-filter=D -- '**/tsconfig*.json' | grep -Fvx -e "tools/autodoc/tsconfig.json" -e "tools/autodoc/tsconfig.lib.json" -e "tools/autodoc/tsconfig.spec.json" || true)"
      if [ -n "$modified_tsconfig_diff" ] || [ -n "$deleted_tsconfig_diff" ]; then
        git diff -- '**/tsconfig*.json'
        echo "ERROR: tsconfig project references are out of date. Run 'moon sync projects' and commit." >&2
        echo "Only these deleted tsconfig files are tolerated during this migration:" >&2
        for allowed_tsconfig_path in $allowed_tsconfig_diff; do
          echo "$allowed_tsconfig_path" >&2
        done
        exit 1
      fi
    deps:
      - "shared:build"
      - "graph:build"
      - "core:build"
      - "plugin-core:build"
      - "domain:build"
      - "operations:build"
      - "db:build"
      - "permissions:build"
      - "workflow:build"
      - "server-shared:build"
      - "auth:build"
      - "message:build"
      - "agent:build"
      - "agent-tools:build"
      - "vcs:build"
    options:
      cache: false
      runFromWorkspaceRoot: true

  moon-task-audit:
    command: "tsx scripts/moon-task-audit.ts"
    options:
      cache: false
      runFromWorkspaceRoot: true

workspace:
  inheritedTasks:
    exclude: ["build", "test"]
